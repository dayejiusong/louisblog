name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6
  PROJECT_PATH: "."
  EXPORT_PRESET: "Web"
  EXPORT_PATH: "build/web/index.html"

jobs:
  export-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Godot templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          cp -r /root/.config/godot ~/.config/godot
          cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Import assets
        run: |
          cd "$PROJECT_PATH"
          godot --headless --editor --import --verbose --quit

      - name: Export Web build
        run: |
          mkdir -p "$(dirname "$EXPORT_PATH")"
          cd "$PROJECT_PATH"
          godot --headless --verbose --export-release "$EXPORT_PRESET" "$EXPORT_PATH"
          touch "$(dirname "$EXPORT_PATH")/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    runs-on: ubuntu-latest
    needs: export-web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
